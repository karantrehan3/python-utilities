services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      - PYTHONUNBUFFERED=1
      # Dev only: exposes /docs, /redoc, /openapi.json. Production (Render) leaves
      # DEBUG unset so the API docs stay hidden.
      - DEBUG=true
    volumes:
      - ./server/src:/app/src
    command: uvicorn src.app.server:app --host 0.0.0.0 --port 4001 --reload
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
    ports:
      - "4002:4002"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_API_URL=http://server:4001
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
      - ./client/vite.config.ts:/app/vite.config.ts
    depends_on:
      - server
    restart: unless-stopped
