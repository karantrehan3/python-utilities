server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    # Security headers (applied to all responses, including errors).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Self-contained app: scripts/styles are same-origin (Mantine injects inline
    # styles); blob:/data: cover generated images and the PDF preview iframe +
    # pdfjs worker. No external origins are permitted.
    # 'wasm-unsafe-eval' permits WebAssembly (hash-wasm, pdfjs codecs) WITHOUT
    # allowing JS eval() — it does not weaken script execution policy.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self' data:; connect-src 'self'; frame-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    location /api/ {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
